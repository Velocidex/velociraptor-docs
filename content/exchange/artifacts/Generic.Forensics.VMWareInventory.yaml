name: Generic.Forensics.VMWareInventory
author: Kaizar Lehri
description: |
  Finds and parses VMware VM configuration files (.vmx) on Mac and Windows. 
  It turns text into an organized list (dictionary) so you can easily 
  search for settings like RAM size, Guest OS, or network modes.

parameters:
  - name: SearchMode
    type: choices
    default: Auto_Detect_Both
    choices: ["Auto_Detect_Both", "Fusion_Mac_Only", "Workstation_Windows_Only", "Custom_Path"]
  - name: CustomPath
    default: "C:/Users/*/Documents/Virtual Machines/**/*.vmx"

sources:
  - name: VMWare_Config_Audit
    query: |
      LET mac_glob = "/Users/*/Virtual Machines*/**/*.vmwarevm/*.vmx"
      LET win_glob = "C:/Users/*/Documents/Virtual Machines/**/*.vmx"

      LET path_list <= if(
          condition=(SearchMode = "Fusion_Mac_Only"), then=[mac_glob],
          else=if(
            condition=(SearchMode = "Workstation_Windows_Only"), then=[win_glob],
            else=if(
              condition=(SearchMode = "Custom_Path"), then=[CustomPath],
              else=[mac_glob, win_glob]
            )
          )
        )
      LET vmx_files = SELECT OSPath, Mtime FROM glob(globs=path_list)
      SELECT 
        OSPath,
        Mtime AS LastModified,
        to_dict(item={
           SELECT _key, _value FROM foreach(
             row={
               SELECT parse_string_with_regex(
                 string=Line,
                 regex='^(?P<_key>[^\\s=]+)\\s*=\\s*"(?P<_value>[^"]*)"') AS Record
               FROM parse_lines(filename=OSPath)
             },
             column="Record"
           ) WHERE _key
        }) AS Config
      FROM vmx_files
